<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>単語帳アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>単語帳アプリ</h1>

<!-- 登録画面 -->
<div id="formScreen">
  <h2>単語登録</h2>

  <input id="wordInput" placeholder="単語">
  <input id="answerInput" placeholder="意味">
  <input id="choice1" placeholder="選択肢1">
  <input id="choice2" placeholder="選択肢2">
  <input id="choice3" placeholder="選択肢3">
  <input id="choice4" placeholder="選択肢4">
  <input id="explanationInput" placeholder="説明">

  <button id="addBtn">登録</button>
</div>

<hr>

<!-- ホーム -->
<div id="homeScreen">
  <button id="startQuizBtn">クイズ開始</button>
</div>

<!-- クイズ -->
<div id="quizScreen" style="display:none;">
  <div id="question"></div>
  <div id="choices"></div>

  <div id="result"></div>
  <div id="explanation"></div>

  <div id="tagStatus"></div>
  <div id="tagButtons"></div>

  <button id="nextBtn" style="display:none;">次へ</button>
  <button id="skipBtn">スキップ</button>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
