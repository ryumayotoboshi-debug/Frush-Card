<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>単語帳アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ホーム -->
  <div id="homeScreen">
    <button id="startQuizBtn">クイズ開始</button>
  </div>

  <!-- クイズ -->
  <div id="quizScreen" style="display:none;">
    <div id="question"></div>

    <div id="choices"></div>

    <div id="result"></div>
    <div id="explanation"></div>

    <!-- タグ表示 -->
    <div id="tagStatus"></div>

    <!-- タグ操作 -->
    <div id="tagButtons"></div>

    <button id="nextBtn" style="display:none;">次へ</button>
    <button id="skipBtn">スキップ</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
